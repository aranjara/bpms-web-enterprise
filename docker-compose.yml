services:
  web:
    build: .
    container_name: bpms-web-enterprise
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/data/bpms_web.db
      - REPORT_PATH=/data/Reporte BPMS.xlsx
      - LOG_PATH=/data/error.log
    volumes:
      - bpms_data:/data
    restart: unless-stopped

volumes:
  bpms_data:
