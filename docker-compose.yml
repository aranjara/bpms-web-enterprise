services:
  web:
    build: .
    container_name: bpms-web-enterprise
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/app/bpms_web.db
      - REPORT_PATH=/app/Reporte BPMS.xlsx
      - LOG_PATH=/app/error.log
    volumes:
      - ./bpms_web.db:/app/bpms_web.db
      - ./Reporte BPMS.xlsx:/app/Reporte BPMS.xlsx
      - ./error.log:/app/error.log
    restart: unless-stopped
