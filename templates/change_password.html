{% extends "base.html" %}{% block content %}<div class='panel narrow'><h2>Cambiar contraseña</h2>{% if force_mode %}<div class='flash danger'>Debes cambiar tu contraseña para continuar.</div>{% endif %}<form method='post' class='stack'><label>Contraseña actual</label><input type='password' name='old_password' required><label>Nueva contraseña</label><input type='password' name='new_password' required><label>Confirmar nueva contraseña</label><input type='password' name='confirm_password' required><div class='button-row'><button type='submit'>Guardar</button>{% if not force_mode %}<a class='clear' href='{{ url_for("dashboard") }}'>Cancelar</a>{% endif %}</div></form></div>{% endblock %}
