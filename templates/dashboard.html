{% extends "base.html" %}

{% block content %}
<section class="cards">
    <div class="card">
        <span>Total Radicados</span>
        <strong>{{ counts.total }}</strong>
    </div>
    <div class="card">
        <span style="color: #475569">En Marcha</span>
        <strong>{{ counts.en_marcha }}</strong>
    </div>
    <div class="card">
        <span style="color: #64748b">Por Vencer</span>
        <strong>{{ counts.por_vencer }}</strong>
    </div>
    <div class="card">
        <span style="color: #1e293b">Vencidos</span>
        <strong>{{ counts.vencidos }}</strong>
    </div>
    <div class="card">
        <span style="color: #94a3b8">Sin Fecha</span>
        <strong>{{ counts.sin_fecha }}</strong>
    </div>
</section>

<div class="charts-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; padding: 0 2rem 2rem;">
    <div class="chart-box" style="height: 350px;">
        <h3 style="margin-bottom: 1rem; color: var(--primary);">Distribución por Estado</h3>
        <div style="height: 250px;">
            <canvas id="statusChart"></canvas>
        </div>
    </div>
    <div class="chart-box" style="height: 350px;">
        <h3 style="margin-bottom: 1rem; color: var(--primary);">Carga por Funcionario (Top 10)</h3>
        <div style="height: 250px;">
            <canvas id="staffChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Register the datalabels plugin
    Chart.register(ChartDataLabels);

    window.renderCharts = function() {
        const isDark = document.body.classList.contains('dark-mode');
        const textColor = isDark ? '#f1f5f9' : '#1e293b';
        const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

        // Status Chart
        const statusCtx = document.getElementById('statusChart').getContext('2d');
        if (window.statusChartInst) window.statusChartInst.destroy();
        window.statusChartInst = new Chart(statusCtx, {
            type: 'doughnut',
            data: {
                labels: ['En Marcha', 'Por Vencer', 'Vencidos', 'Sin Fecha'],
                datasets: [{
                    data: [{{ counts.en_marcha }}, {{ counts.por_vencer }}, {{ counts.vencidos }}, {{ counts.sin_fecha }}],
                    backgroundColor: ['#475569', '#64748b', '#1e293b', '#94a3b8'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { color: textColor } },
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 14 },
                        formatter: (value) => value > 0 ? value : ''
                    }
                }
            }
        });

        // Staff Chart
        const staffCtx = document.getElementById('staffChart').getContext('2d');
        if (window.staffChartInst) window.staffChartInst.destroy();
        window.staffChartInst = new Chart(staffCtx, {
            type: 'bar',
            data: {
                labels: {{ chart_data.staff_labels|tojson }},
                datasets: [{
                    label: 'Radicados',
                    data: {{ chart_data.staff_values|tojson }},
                    backgroundColor: '#475569',
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor } },
                    x: { grid: { display: false }, ticks: { color: textColor, font: { size: 10 } } }
                },
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        anchor: 'end',
                        align: 'top',
                        color: textColor,
                        font: { weight: 'bold' },
                        formatter: (value) => value
                    }
                }
            }
        });
    };

    window.addEventListener('load', () => {
        window.renderCharts();
        
        gsap.from(".card", {
            duration: 0.8,
            y: 30,
            opacity: 0,
            stagger: 0.1,
            ease: "power2.out"
        });

        gsap.from(".chart-box", {
            duration: 1,
            scale: 0.95,
            opacity: 0,
            delay: 0.3,
            stagger: 0.2,
            ease: "back.out(1.7)"
        });
    });
</script>
{% endblock %}
