{% extends "base.html" %}{% block content %}<div class='panel narrow'><h2>Editar Radicado {{ radicado }}</h2><div class='edit-meta'><b>Funcionario:</b> {{ row["FUNCIONARIO"] }}<br><b>Tipo solicitud:</b> {{ row["TIPO_SOLICITUD"] }}</div><form method='post' class='stack'><label>Estado trámite actual</label><input type='text' name='estado' value='{{ data["estado_tramite_actual"] if data else row["ESTADO_TRAMITE_ACTUAL"] }}'><label>Fecha vencimiento</label><input type='date' name='fecha' value='{{ current_fecha }}'><label>Observaciones</label><textarea name='observaciones' rows='5'>{{ data["observaciones"] if data else row["OBSERVACIONES"] }}</textarea><div class='button-row'><button type='submit'>Guardar</button><a class='clear' href='{{ url_for("dashboard") }}'>Cancelar</a></div></form></div>{% endblock %}
