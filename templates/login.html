<!doctype html><html lang='es'><head><meta charset='utf-8'><title>Control BPMS Web - Login</title><link rel='stylesheet' href='{{ url_for("static", filename="styles.css") }}'></head><body class='login-body'><div class='login-card'><h1>Control BPMS Web</h1>{% with messages = get_flashed_messages(with_categories=true) %}{% for category, message in messages %}<div class='flash {{ category }}'>{{ message }}</div>{% endfor %}{% endwith %}<form method='post'><label>Usuario</label><input type='text' name='username' required><label>Contraseña</label><input type='password' name='password' required><button type='submit'>Ingresar</button></form></div></body></html>
